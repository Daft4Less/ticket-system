apiVersion: apps/v1
kind: Deployment
metadata:
  name: notificaciones-stub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notificaciones-stub
  template:
    metadata:
      labels:
        app: notificaciones-stub
    spec:
      containers:
        - name: notificaciones-stub
          image: danielaag5/notificaciones-stub:v1
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: notificaciones-stub
spec:
  selector:
    app: notificaciones-stub
  ports:
    - port: 8000
      targetPort: 8000
